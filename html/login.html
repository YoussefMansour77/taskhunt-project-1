<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskHunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/logn.css">
</head>
<style>
  .error-msg { color:#e53e3e; font-size:14px; margin-top:8px; display:none; text-align:center; }
  .btn-submit:disabled { opacity:.6; cursor:not-allowed; }
</style>
<body>

<div class="login-card">
    <header>
        <h1>Log in to TaskHunt</h1>
        <p class="subtitle">Log in to continue</p>
    </header>

    <div class="social-container">
        <button class="btn-social">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-social">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <div class="divider">
        <span>OR LOGIN WITH EMAIL</span>
    </div>

    <form id="loginForm" action="#">
        <div class="form-group">
            <!-- ✅ عدلنا هنا بس -->
            <input type="text" id="username" placeholder="Username or Email" required>
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="form-options">
            <label class="checkbox-group">
                <input type="checkbox">
                <span>Remember me</span>
            </label>
            <a href="#" class="forgot-pass">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Log In</button>
        <p class="error-msg" id="error-msg"></p>
    </form>

    <footer>
        Don't have an account? <a href="signup/ask-signup.html">Sign Up</a>
    </footer>
</div>
<script src="../assets/js/api.js"></script>
<script>
  function redirectUser(user) {
    if (user.role === 'admin') return window.location.href = 'dashboard/dashboard.html';
    if (user.role === 'freelancer') {
      return window.location.href = user.profile_complete ? 'freelancers-home.html' : 'setup/freelancer-setup.html';
    }
    if (user.role === 'client') {
      return window.location.href = user.profile_complete ? 'client-home.html' : 'setup/client-setup.html';
    }
  }

  // Redirect if already logged in
  if (Auth.isLoggedIn()) redirectUser(Auth.user());

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const email    = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const data = await login(email, password);
      redirectUser(data.user);
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>

</body>
</html>
